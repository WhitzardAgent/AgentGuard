services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentguard:latest
    command: ["serve"]
    restart: unless-stopped
    ports:
      - "${AGENTGUARD_PORT:-38080}:38080"
    environment:
      AGENTGUARD_HOST: 0.0.0.0
      AGENTGUARD_PORT: 38080
      # Optional: point at a served AgentDoG / LLM endpoint to use the real models.
      AGENTDOG_API_BASE: "${AGENTDOG_API_BASE:-}"
      AGENTDOG_MODEL: "${AGENTDOG_MODEL:-agentdog}"
      AGENTDOG_API_KEY: "${AGENTDOG_API_KEY:-}"
      AGENTGUARD_LLM_BASE_URL: "${AGENTGUARD_LLM_BASE_URL:-}"
      AGENTGUARD_LLM_MODEL: "${AGENTGUARD_LLM_MODEL:-}"
      AGENTGUARD_LLM_API_KEY: "${AGENTGUARD_LLM_API_KEY:-}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:38080/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentguard:latest
    command: ["frontend"]
    restart: unless-stopped
    ports:
      - "${AGENTGUARD_FRONTEND_PORT:-38008}:38008"
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 38008
      AGENTGUARD_API_BASE: http://server:38080
    depends_on:
      server:
        condition: service_healthy

  # E2E verifier. Enable with: docker compose --profile e2e up --abort-on-container-exit
  client:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentguard:latest
    command: ["client"]
    profiles: ["e2e"]
    depends_on:
      server:
        condition: service_healthy
    environment:
      AGENTGUARD_SERVER_URL: http://server:38080
