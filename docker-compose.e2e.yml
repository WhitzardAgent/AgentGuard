# End-to-end topology override: a real server (PDP) + a one-shot client (PEP).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build \
#     --abort-on-container-exit --exit-code-from client
#
# The `client` service runs the cross-process e2e scenario against the `server`
# container over the compose network and exits non-zero on failure.
services:
  client:
    command: ["client"]
    profiles: []
    depends_on:
      server:
        condition: service_healthy
    environment:
      AGENTGUARD_SERVER_URL: http://server:38080
    restart: "no"
