# End-to-end topology: a real server (PDP) + a client (PEP/Harness) container.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build \
#     --abort-on-container-exit --exit-code-from client
#
# The `client` service runs the Harness dual-path e2e against the `agentguard`
# server over the compose network and exits non-zero if any check fails.
services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentguard:latest
    command: ["client"]
    depends_on:
      agentguard:
        condition: service_started
    environment:
      AGENTGUARD_API_BASE: http://agentguard:${AGENTGUARD_PORT:-38080}
      AGENTGUARD_API_KEY: ${AGENTGUARD_API_KEY:-}
      # Optional: point the sandbox at an OpenSandbox control plane.
      AGENTGUARD_SANDBOX_BACKEND: ${AGENTGUARD_SANDBOX_BACKEND:-local}
    restart: "no"
